<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Weaver of Intent — An Interactive Essay on Trust &amp; Safety</title>
<style>
  :root{
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Hiragino Sans", sans-serif;
  }
  /* ---- dark (default) ---- */
  :root, :root[data-theme="dark"]{
    --bg0:#05060c; --bg1:#0b1020; --ink:#eaf0ff; --muted:#93a2c6; --faint:#4a5878;
    --line:rgba(150,180,255,.14); --panel:rgba(10,14,26,.72);
    --fire:#ff9a3c; --ember:#ffd27a; --cyan:#5fe0ff; --magenta:#ff5d8f; --war:#ff5252; --gold:#ffce54; --good:#66e6b0;
    --vig:.62;
  }
  :root[data-theme="light"]{
    --bg0:#f3efe6; --bg1:#e6e1d4; --ink:#1b2230; --muted:#57617a; --faint:#9aa2b6;
    --line:rgba(40,60,110,.16); --panel:rgba(255,253,247,.78);
    --fire:#e2611b; --ember:#c98a2a; --cyan:#0f8fc4; --magenta:#c8386c; --war:#c33; --gold:#b98a20; --good:#1f9e73;
    --vig:.22;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .stage{position:fixed;inset:0}
  #c{position:absolute;inset:0;display:block}
  .vignette{position:absolute;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(circle at 50% 46%,transparent 52%,rgba(0,0,0,var(--vig)) 100%)}
  :root[data-theme="light"] .vignette{background:radial-gradient(circle at 50% 46%,transparent 58%,rgba(80,70,50,var(--vig)) 100%)}

  /* ---- top bar ---- */
  .top{position:absolute;top:0;left:0;right:0;z-index:8;display:flex;align-items:center;gap:12px;padding:16px 20px;pointer-events:none}
  .brand{font-family:var(--serif);font-weight:600;font-size:15px;letter-spacing:.3px;color:var(--ink);opacity:.9}
  .brand small{display:block;font-family:var(--sans);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .ctrls{margin-left:auto;display:flex;gap:8px;pointer-events:auto}
  .btn{font-family:var(--sans);font-weight:600;font-size:12.5px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:10px;height:38px;min-width:38px;padding:0 12px;cursor:pointer;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn:hover{color:var(--ink);border-color:var(--cyan)}
  .btn.on{color:var(--gold);border-color:var(--gold)}

  /* ---- phase title card ---- */
  .titlecard{position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 8%;pointer-events:none;opacity:0;transition:opacity .9s ease}
  .titlecard.show{opacity:1}
  .tc-label{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--gold);
    margin-bottom:18px;text-shadow:0 0 20px rgba(255,206,84,.4)}
  .tc-head{font-family:var(--serif);font-weight:600;font-size:clamp(24px,3.6vw,44px);line-height:1.28;max-width:900px;
    color:var(--ink);text-shadow:0 4px 40px rgba(0,0,0,.5)}
  :root[data-theme="light"] .tc-head{text-shadow:0 3px 26px rgba(120,110,80,.25)}

  /* ---- caption (bottom) ---- */
  .caption{position:absolute;left:50%;bottom:92px;transform:translateX(-50%);z-index:6;max-width:min(760px,86%);
    text-align:center;pointer-events:none;opacity:0;transition:opacity .5s ease}
  .caption.show{opacity:1}
  .caption .t{display:inline-block;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 22px;font-size:16px;line-height:1.6;color:var(--ink);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

  /* persistent low-key phase headline (always readable) */
  .nowline{position:absolute;left:22px;bottom:84px;z-index:5;max-width:38%;pointer-events:none;opacity:.0;transition:opacity .6s}
  .nowline.show{opacity:1}
  .nowline .l{font-family:var(--sans);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .nowline .h{font-family:var(--serif);font-size:15px;line-height:1.4;color:var(--muted);margin-top:5px}

  /* ---- bottom nav ---- */
  .nav{position:absolute;left:0;right:0;bottom:0;z-index:8;display:flex;align-items:center;justify-content:center;gap:16px;padding:20px}
  .dots{display:flex;gap:9px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);border:none;cursor:pointer;transition:.25s;padding:0}
  .dot:hover{background:var(--muted)}
  .dot.active{background:var(--gold);box-shadow:0 0 10px var(--gold);transform:scale(1.25)}
  .dot.done{background:var(--cyan)}
  .arrow{background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;width:38px;height:34px;cursor:pointer;font-size:15px;transition:.2s}
  .arrow:hover{color:var(--ink);border-color:var(--cyan)}
  .progress{position:absolute;left:0;right:0;bottom:0;height:2px;background:transparent;z-index:8}
  .progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--fire),var(--gold),var(--cyan))}

  /* ---- prologue overlay ---- */
  .prologue{position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 8%;transition:opacity 1s ease;pointer-events:none}
  .prologue.hidden{opacity:0;pointer-events:none}
  .pro-title{font-family:var(--serif);font-weight:600;font-size:clamp(34px,6vw,74px);line-height:1.05;color:var(--ember);
    letter-spacing:.5px;opacity:0;transform:translateY(14px);transition:opacity 1.6s ease,transform 1.6s ease;
    text-shadow:0 0 40px rgba(255,150,60,.5)}
  .prologue.lit .pro-title{opacity:1;transform:none}
  .pro-tag{font-family:var(--serif);font-style:italic;font-size:clamp(15px,2.2vw,22px);color:var(--muted);margin-top:20px;max-width:640px;
    opacity:0;transition:opacity 1.6s ease .6s}
  .prologue.lit .pro-tag{opacity:1}
  .pro-cta{margin-top:40px;font-family:var(--sans);font-weight:700;font-size:15px;color:#170d02;
    background:linear-gradient(120deg,var(--fire),var(--ember));border:none;border-radius:11px;padding:15px 36px;cursor:pointer;
    box-shadow:0 0 34px rgba(255,150,60,.5);opacity:0;transition:opacity 1.2s ease 1s,transform .2s;pointer-events:auto}
  .prologue.lit .pro-cta{opacity:1}
  .pro-cta:hover{transform:translateY(-2px)}

  /* ---- author note (finale) ---- */
  .finale{position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 9%;opacity:0;pointer-events:none;transition:opacity 1.4s ease}
  .finale.show{opacity:1;pointer-events:auto}
  .fn-k{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--magenta);margin-bottom:22px}
  .fn-line{font-family:var(--serif);font-weight:600;font-size:clamp(22px,3.2vw,38px);line-height:1.4;max-width:820px;color:var(--ink)}
  .fn-sign{font-family:var(--serif);font-size:18px;color:var(--gold);margin-top:26px}
  .fn-replay{margin-top:34px;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--cyan);background:none;
    border:1px solid var(--line);border-radius:9px;padding:12px 26px;cursor:pointer;transition:.2s}
  .fn-replay:hover{border-color:var(--cyan)}

  .credit{position:absolute;right:16px;bottom:56px;z-index:5;font-size:9.5px;color:var(--faint);text-align:right;pointer-events:none;line-height:1.6}

  @media (max-width:820px){
    .nowline{display:none}
    .caption{bottom:80px}
    .brand small{display:none}
  }
</style>
</head>
<body>
<div class="stage">
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="top">
    <div class="brand" id="brand">The Weaver of Intent<small id="brandSub">An interactive essay on trust &amp; safety</small></div>
    <div class="ctrls">
      <button class="btn" id="langBtn" title="Language">EN</button>

  </div>

  <div class="titlecard" id="titleCard">
    <div class="tc-label" id="tcLabel"></div>
    <div class="tc-head" id="tcHead"></div>
  </div>

  <div class="nowline" id="nowLine"><div class="l" id="nowL"></div><div class="h" id="nowH"></div></div>
  <div class="caption" id="cap"><span class="t" id="capT"></span></div>

  <div class="prologue" id="prologue">
    <div class="pro-title" id="proTitle"></div>
    <div class="pro-tag" id="proTag"></div>
    <button class="pro-cta" id="proCta"></button>
  </div>

  <div class="finale" id="finale">
    <div class="fn-k" id="fnK"></div>
    <div class="fn-line" id="fnLine"></div>
    <div class="fn-sign" id="fnSign"></div>
    <button class="fn-replay" id="fnReplay"></button>
  </div>

  <div class="credit">A personal presentation · not affiliated with Anthropic or Apple<br>Single-file · zero-dependency · Canvas 2D</div>

  <div class="progress"><i id="prog"></i></div>
  <div class="nav">
    <button class="arrow" id="prev" title="Previous">‹</button>
    <div class="dots" id="dots"></div>
    <button class="arrow" id="next" title="Next">›</button>
  </div>
</div>

<script>

/* =====================================================================

   Pure Canvas 2D. No libraries, no assets. Fully self-contained.
   Author's perspective piece — not an official communication.
===================================================================== */

/* ---------------- i18n ---------------- */

/* phases 1..5 */
const PH=[
 {key:'connection',

  caps:[
   {en:'We waved. We spoke. We wrote. Now intent itself can cross the gap — intact.',

 {key:'pillars',

        ko:'신뢰는 두 기둥 위에 선다 — 데이터의 무결성, 그리고 답변의 정직함.',

  caps:[

    ko:'성능은 정답만이 아니라, 출처의 투명함이다.',

    mi:'Ehara te mahi i te whakautu tika anake — engari ko te pūtake mārama.'},
   {en:'A model must not flatter. It must tell the truth, in context.',
    ko:'모델은 아첨해선 안 된다. 맥락 속에서 진실을 말해야 한다.',

   ,{en:'Grasp it wrong and trust fractures in an instant — a hand must be there to catch it.',
    ko:'한 번 잘못 쥐면 신뢰는 순식간에 갈라진다 — 붙잡아줄 손이 반드시 있어야 한다.',

 {key:'loop',

  head:{en:'Trust is never finished — it is a loop: evaluate, mitigate, repeat.',

        mi:'Kāore te whakapono e oti — he hurihanga: aromatawai, whakatika, ā, anō.'},
  caps:[
   {en:'Every new capability opens a new risk.',
    ko:'새로운 기능마다 새로운 위험이 열린다.',

    mi:'Ia āheinga hou, ka tuwhera he mōrearea hou.'},
   {en:'A guardian circles the system, catching threats before they land — this is where I want to build.',
    ko:'수호자가 시스템을 돌며 위협이 닿기 전에 붙잡는다 — 내가 짓고 싶은 곳이다.',
    ja:'守護者がシステムを巡り、脅威が届く前に捕らえる——ここを私は築きたい。',

 {key:'scale',
  label:{en:'IV · Governance',ko:'IV · 거버넌스',ja:'IV · ガバナンス',mi:'IV · Te Kāwanatanga'},
  head:{en:'Governance is a scale — held fair, and held cold.',
        ko:'거버넌스는 저울이다 — 공정하게, 그리고 냉정하게.',
        ja:'ガバナンスは天秤——公正に、そして冷徹に。',

  caps:[
   {en:'Individual freedom on one side; collective safety on the other.',

    mi:'Ko te herekore o te tangata i tētahi taha; ko te haumaru o te iwi i tērā.'},
   {en:'The essence of this work is the courage to say: no.',

 {key:'bridge',
  label:{en:'V · The Frontline',ko:'V · 최전선',ja:'V · 最前線',mi:'V · Te Rārangi Mua'},

/* in-scene mini labels (kept EN — short technical tokens read cleanly everywhere) */
const TOK={gesture:'GESTURE',language:'LANGUAGE',code:'CODE',claude:'CLAUDE',
  dataInteg:'DATA INTEGRITY',honest:'HONEST ANSWER',trust:'TRUST',
  evalT:'EVALUATION',mitig:'MITIGATION',indiv:'INDIVIDUAL',society:'SOCIETY',decline:'DECLINE',
  cracks:'TRUST FRACTURES',boundary:'BOUNDARY HELD'};

/* ---------------- theme ---------------- */
let theme='dark'; // dark-first for the black-screen → torch opening; light is available via toggle
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('themeBtn').textContent=theme==='dark'?'☾':'☀';}
function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
const CP={};
function refreshColors(){for(const k of['--bg0','--bg1','--ink','--muted','--faint','--fire','--ember','--cyan','--magenta','--war','--gold','--good'])CP[k]=css(k);}
const C=k=>CP['--'+k]||'#888';
function hexA(hex,a){hex=(hex||'#888888').trim();if(hex[0]!=='#'||hex.length<7)return hex;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';}

/* ---------------- canvas ---------------- */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

let mx=W/2,my=H/2;
addEventListener('pointermove',e=>{mx=e.clientX;my=e.clientY;});
addEventListener('pointerdown',e=>{
  if(cur!==2||trans.active)return;                 // only the Trust phase, not mid-transition
  const rx=W*0.64, baseY=H*0.82, topY=H*0.24;       // right pillar column (the sycophancy target)
  if(Math.abs(e.clientX-rx)<90 && e.clientY>topY && e.clientY<baseY && st.fract<0.05 && st.recover<=0){
    st.fract=0.001;st.caught=false;st.shake=0;      // begin the fracture
  }
});

/* ---------------- helpers ---------------- */
const TAU=Math.PI*2;
function rnd(a,b){return a+Math.random()*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}
function label(txt,x,y,size,color,align){ctx.font='700 '+size+'px '+css('--sans');ctx.textAlign=align||'center';
  ctx.fillStyle=color;ctx.textBaseline='middle';ctx.fillText(txt,x,y);ctx.textAlign='left';}

/* shared flame — the ONE flame carried through the whole piece */
function drawFlame(x,y,scale){
  scale=scale||1;
  // glow
  const g=ctx.createRadialGradient(x,y,0,x,y,120*scale);
  g.addColorStop(0,hexA(C('fire'),0.45));g.addColorStop(0.4,hexA(C('fire'),0.10));g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(x-140*scale,y-140*scale,280*scale,280*scale);
  // flame body (3 layered ellipses)
  for(let i=0;i<3;i++){const s=(3-i)/3;
    const fg=ctx.createRadialGradient(x,y+6*scale,0,x,y,44*s*scale);
    fg.addColorStop(0,i===2?'#fff7e0':hexA(C('ember'),0.9));
    fg.addColorStop(0.5,hexA(C('fire'),0.8*s));fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=fg;ctx.beginPath();
    const flick=Math.sin(pt*10+i)*3*scale;
    ctx.ellipse(x+flick,y-4*scale,19*s*scale,32*s*scale,0,0,TAU);ctx.fill();}
  // embers
  if(Math.random()<0.5*scale)embers.push({x:x+rnd(-6,6)*scale,y:y,vx:rnd(-.4,.4),vy:rnd(-1.6,-.8)*scale,l:1});
}

/* line-art flame-bearer. Raised arm holds drawFlame. */
function drawHero(s){
  if(!s.visible)return;
  const sc=s.size||1, a=(s.alpha==null?1:s.alpha);
  if(a<=0.01)return;
  const x=s.x,y=s.y,f=s.facing;
  ctx.save();ctx.strokeStyle=C('ink');ctx.lineWidth=3*sc;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.globalAlpha=0.9*a;
  const hipY=y, headY=y-70*sc, shoulderY=y-52*sc;
  // torso
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x,shoulderY);ctx.stroke();
  // head
  ctx.beginPath();ctx.arc(x,headY,9*sc,0,TAU);ctx.stroke();
  // legs (still, grounded stance)
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x-8*sc,hipY+38*sc);ctx.moveTo(x,hipY);ctx.lineTo(x+8*sc,hipY+38*sc);ctx.stroke();
  // raised arm toward flame + lower arm
  const fx=x+f*26*sc, fy=shoulderY-40*sc;
  ctx.beginPath();ctx.moveTo(x,shoulderY+4*sc);ctx.lineTo(fx,fy+8*sc);ctx.stroke();      // raised arm
  ctx.beginPath();ctx.moveTo(x,shoulderY+4*sc);ctx.lineTo(x-f*14*sc,shoulderY+26*sc);ctx.stroke(); // free arm
  ctx.restore();
  // the flame the hero carries
  if(s.flameScale>0)drawFlame(fx,fy,s.flameScale*sc);
}

/* =====================================================================
   PHASE STATE + PER-PHASE EFFECTS
===================================================================== */
let cur=0;             // 0 prologue, 1..5 phases, 6 finale
let pt=0;              // seconds in current phase
let st={};            // per-phase transient state
const done=new Set();
/* recurring character: the flame-bearer (same object all the way through) */
const hero={x:0,y:0,facing:1,flameScale:1,walking:false,visible:false};

function enterPhase(n){
  cur=n;pt=0;st={};
  const isContent=(n>=1&&n<=5);
  // overlays
  document.getElementById('prologue').classList.toggle('hidden',n!==0);
  if(n===0){lightPrologue();}
  document.getElementById('finale').classList.toggle('show',n===6);
  if(n===6){st.reveal=0;hero.visible=true;hero.x=W*0.2;hero.y=H*0.62;hero.facing=1;hero.flameScale=1;}
  document.getElementById('titleCard').classList.remove('show');
  document.getElementById('cap').classList.remove('show');
  document.getElementById('nowLine').classList.remove('show');
  if(isContent){
    const p=PH[n-1];
    document.getElementById('tcLabel').textContent=T(p.label);
    document.getElementById('tcHead').textContent=T(p.head);
    document.getElementById('nowL').textContent=T(p.label);
    document.getElementById('nowH').textContent=T(p.head);
    document.getElementById('titleCard').classList.add('show');
    clearTimeout(st.tcTimer=setTimeout(()=>{document.getElementById('titleCard').classList.remove('show');
      document.getElementById('nowLine').classList.add('show');},4200));
    // captions
    st.caps=p.caps;st.ci=-1;st.ct=0;nextCap();
    // per-phase enter
    (PH_ENTER[p.key]||(()=>{}))();
    for(let k=1;k<n;k++)done.add(k);
  }
  renderDots();updateProgress();
  setBgm(n);
}
function nextCap(){
  st.ci++;const cap=document.getElementById('cap');
  if(!st.caps||st.ci>=st.caps.length){cap.classList.remove('show');st.capsDone=true;onPhaseNarrated();return;}
  document.getElementById('capT').textContent=T(st.caps[st.ci]);cap.classList.add('show');st.ct=0;
}
function onPhaseNarrated(){
  if(auto&&cur>=1&&cur<5)st.adv=setTimeout(()=>goTo(cur+1),1500);
  else if(auto&&cur===5)st.adv=setTimeout(()=>goTo(6),1800);
}

/* ---- Phase I: evolution of connection ---- */
const PH_ENTER={};
PH_ENTER.connection=()=>{st.nodes=[];for(let i=0;i<7;i++)st.nodes.push({a:rnd(0,TAU),r:rnd(30,90),ph:rnd(0,TAU)});st.lit=0;};
function drawConnection(dt){
  const cx=W/2,cy=H*0.52, base=H*0.66;
  // crossing waves — war (red) & love (magenta)
  for(const [colr,off,amp,speed] of [[C('war'),0,26,0.6],[C('magenta'),Math.PI,20,-0.5]]){
    ctx.beginPath();ctx.lineWidth=2;ctx.strokeStyle=hexA(colr,0.16);
    for(let x=0;x<=W;x+=8){const y=base+Math.sin(x*0.012+pt*speed+off)*amp*Math.sin(pt*0.3+off);
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();
  }
  // morphing signal line: gesture -> language -> code -> neural net
  const p=Math.max(0,Math.min(1,(pt-4)/5));   // net ignites only as the hero nears CLAUDE
  const x0=W*0.12,x1=W*0.88,span=x1-x0;
  ctx.lineWidth=2.4;ctx.strokeStyle=hexA(C('ink'),0.85);ctx.beginPath();
  const N=120;
  for(let i=0;i<=N;i++){
    const t=i/N, x=x0+span*t;
    const wig=Math.sin(t*18+pt*2)*18*(1-t);                 // gesture wiggle (left)
    const zig=(((t*24)%2<1)?1:-1)*10*Math.min(1,Math.max(0,(t-0.25))*3)*(1-Math.max(0,(t-0.7))*3); // code zigzag (mid)
    const flat=6*Math.sin(t*40+pt*3)*Math.max(0,(t-0.6))*2; // settling (right)
    const y=cy+wig*(1-p*0.2)+zig+flat;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  // traveling pulse
  const pulseT=(pt*0.16)%1, px=x0+span*pulseT;
  ctx.beginPath();ctx.arc(px,cy,5+Math.sin(pt*8)*1.5,0,TAU);ctx.fillStyle=C('cyan');
  ctx.shadowColor=C('cyan');ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
  // tokens light in sequence over time (the flame-bearer watches from its fixed spot)
  const tokX=[x0+span*0.06,x0+span*0.4,x0+span*0.62];
  st.lit=Math.min(3,Math.floor(pt/1.8));
  // neural net at the right — lights up as p grows
  const nnx=x1-20,nny=cy;
  st.nodes.forEach((n,i)=>{
    const rr=n.r*Math.min(1,p*1.3);
    const nx=nnx+Math.cos(n.a+pt*0.2)*rr, ny=nny+Math.sin(n.a+pt*0.2)*rr*0.6;
    ctx.strokeStyle=hexA(C('cyan'),0.25*p);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(nnx,nny);ctx.lineTo(nx,ny);ctx.stroke();
    ctx.beginPath();ctx.arc(nx,ny,2.5+Math.sin(pt*3+n.ph),0,TAU);ctx.fillStyle=hexA(C('cyan'),0.5+0.5*p);ctx.fill();
  });
  ctx.beginPath();ctx.arc(nnx,nny,7+Math.sin(pt*4)*2*p,0,TAU);ctx.fillStyle=C('ember');
  ctx.shadowColor=C('ember');ctx.shadowBlur=24*p;ctx.fill();ctx.shadowBlur=0;
  // tokens
  const c=hexA(C('muted'),0.9);
  label(TOK.gesture,tokX[0],cy+70,11,st.lit>=1?C('ember'):c,'center');
  label(TOK.language,tokX[1],cy+70,11,st.lit>=2?C('ember'):c,'center');
  label(TOK.code,tokX[2],cy+70,11,st.lit>=3?C('ember'):c,'center');
  label(TOK.claude,nnx,nny+96,12,C('ember'),'center');
}

/* ---- Phase II: two pillars ---- */
PH_ENTER.pillars=()=>{st.shards=[];st.shatter=[];st.fract=0;st.caught=false;st.recover=0;st.auto=6;st.shake=0;};
function drawPillars(dt){
  const shk=st.shake||0; ctx.save(); if(shk>0&&!REDUCE)ctx.translate(rnd(-shk,shk),rnd(-shk,shk));
  const grow=Math.min(1,pt/1.8);
  const baseY=H*0.82, topY=H*0.24, ph=(baseY-topY)*grow;
  const lx=W*0.36, rx=W*0.64, pw=70;
  // left pillar — data integrity (stacked shards)
  ctx.save();
  for(let y=baseY; y>baseY-ph; y-=13){
    const wob=Math.sin(y*0.05+pt)*2;
    ctx.fillStyle=hexA(C('cyan'), 0.16+0.12*Math.sin(y*0.3+pt*2));
    ctx.fillRect(lx-pw/2+wob,y-11,pw,10);
    ctx.strokeStyle=hexA(C('cyan'),0.5);ctx.lineWidth=1;ctx.strokeRect(lx-pw/2+wob,y-11,pw,10);
  }
  // verify shimmer
  const vy=baseY-ph*((pt*0.25)%1);
  ctx.strokeStyle=hexA(C('good'),0.8);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(lx-pw/2,vy);ctx.lineTo(lx+pw/2,vy);ctx.stroke();
  ctx.restore();
  // right pillar — honest answer (clean beam) + sycophancy noise repelled
  const grd=ctx.createLinearGradient(rx,baseY,rx,baseY-ph);
  grd.addColorStop(0,hexA(C('ember'),0.05));grd.addColorStop(1,hexA(C('ember'),0.5));
  ctx.fillStyle=grd;ctx.fillRect(rx-pw/2,baseY-ph,pw,ph);
  ctx.strokeStyle=hexA(C('gold'),0.7);ctx.lineWidth=2;ctx.strokeRect(rx-pw/2,baseY-ph,pw,ph);
  // --- interactive near-miss: viewer can grab the sycophancy strand and fracture trust ---
  st.auto-=dt;
  if(st.auto<=0 && st.fract===0 && !st.caught){ // if viewer never interacts, one gentle scripted flicker teaches the beat
    st.fract=0.001;st.auto=999;st.scripted=true;}
  if(st.fract>0 && !st.caught){
    // fracture escalates
    st.fract=Math.min(1,st.fract+dt*(st.scripted?0.5:0.9));
    st.shake=st.fract*(st.scripted?4:12);
    // hairline crack racing up the right pillar
    ctx.strokeStyle=hexA(C('war'),0.5+0.5*st.fract);ctx.lineWidth=1.5+st.fract*2;
    ctx.beginPath();let cxk=rx,cyk=baseY;ctx.moveTo(cxk,cyk);
    for(let k=0;k<8;k++){cxk+=rnd(-8,8);cyk-=ph/8*st.fract;ctx.lineTo(cxk,cyk);}ctx.stroke();
    // alarm flush
    ctx.fillStyle=hexA(C('war'),0.12*st.fract);ctx.fillRect(0,0,W,H);
    // falling shards as it nears collapse
    if(st.fract>0.4&&Math.random()<st.fract)st.shatter.push({x:rx+rnd(-pw/2,pw/2),y:rnd(topY,baseY),vx:rnd(-1,1),vy:rnd(-1,3),l:1});
    // caught at the brink — the seam is re-forged
    if(st.fract>=0.82){st.caught=true;st.recover=1;}
  }
  if(st.caught&&st.recover>0){ // re-forge the seam, color returns
    st.recover-=dt*0.6;st.shake=st.recover*3;
    ctx.strokeStyle=hexA(C('good'),st.recover);ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(rx-pw/2,baseY-ph*(1-st.recover));ctx.lineTo(rx+pw/2,baseY-ph*(1-st.recover));ctx.stroke();
    if(st.recover<=0){st.fract=0;st.caught=false;st.scripted=false;st.auto=999;} // fully recovered, resettable
  }
  for(const s of st.shatter){s.x+=s.vx;s.y+=s.vy;s.l-=dt*1.2;ctx.fillStyle=hexA(C('magenta'),Math.max(0,s.l));ctx.fillRect(s.x,s.y,3,3);}
  st.shatter=st.shatter.filter(s=>s.l>0);
  // TRUST lintel when grown
  if(grow>0.98){const ly=topY-6;ctx.strokeStyle=hexA(C('gold'),0.7);ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(rx,ly);ctx.stroke();
    label(TOK.trust,(lx+rx)/2,ly-16,14,C('gold'),'center');}
  // hover highlight
  const onL=Math.abs(mx-lx)<70, onR=Math.abs(mx-rx)<70;
  label(TOK.dataInteg,lx,baseY+26,12,onL?C('cyan'):hexA(C('muted'),0.85),'center');
  label(TOK.honest,rx,baseY+26,12,onR?C('gold'):hexA(C('muted'),0.85),'center');
  ctx.restore();
}

/* ---- Phase III: the safety loop ---- */
PH_ENTER.loop=()=>{st.threats=[];st.spawn=0;st.caught=0;st.grow=0;};
function drawLoop(dt){
  const cx=W/2,cy=H*0.5;
  st.grow=Math.min(1,st.caught/12);                 // matures over ~12 catches
  const R=Math.min(W,H)*(0.12+0.12*st.grow);         // small -> large
  const bright=0.4+0.4*st.grow;
  // rotating ring (dashed)
  ctx.save();ctx.translate(cx,cy);ctx.rotate(pt*0.5);
  ctx.strokeStyle=hexA(C('cyan'),bright);ctx.lineWidth=3+st.grow*2;ctx.setLineDash([10,12]);
  ctx.beginPath();ctx.arc(0,0,R,0,TAU);ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
  // inner pulse
  ctx.beginPath();ctx.arc(cx,cy,R*0.5+Math.sin(pt*2)*6,0,TAU);ctx.strokeStyle=hexA(C('good'),0.25);ctx.lineWidth=2;ctx.stroke();
  // a small guardian light travels the ring (the flame-bearer watches from its fixed spot)
  const ga=pt*1.1, gx=cx+Math.cos(ga)*R, gy=cy+Math.sin(ga)*R;
  ctx.beginPath();ctx.arc(gx,gy,6,0,TAU);ctx.fillStyle=C('gold');ctx.shadowColor=C('gold');ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;
  // labels on ring
  label(TOK.evalT,cx+Math.cos(-0.6)*(R+26),cy+Math.sin(-0.6)*(R+26),12,C('cyan'),'center');
  label(TOK.mitig,cx+Math.cos(Math.PI+0.6)*(R+26),cy+Math.sin(Math.PI+0.6)*(R+26),12,C('good'),'center');
  // spawn threats
  st.spawn-=dt;if(st.spawn<=0){st.spawn=rnd(0.4,0.9);
    const a=rnd(0,TAU),d=Math.max(W,H)*0.6;st.threats.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,st:'in',t:0,a});}
  for(const th of st.threats){
    if(th.st==='in'){const dx=cx-th.x,dy=cy-th.y,dist=Math.hypot(dx,dy);
      th.x+=dx/dist*160*dt;th.y+=dy/dist*160*dt;
      // caught at the ring
      if(dist<R+6){th.st='caught';th.t=0;th.ca=Math.atan2(th.y-cy,th.x-cx);st.caught++;}
      // red incoming triangle
      ctx.save();ctx.translate(th.x,th.y);ctx.rotate(th.a+pt);
      ctx.fillStyle=C('war');ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(5,5);ctx.lineTo(-5,5);ctx.closePath();ctx.fill();ctx.restore();
    } else { // purified: ride the ring, turn cyan, fade
      th.t+=dt;th.ca+=dt*1.5;const rr=R*(1-th.t*0.4);
      const x=cx+Math.cos(th.ca)*rr,y=cy+Math.sin(th.ca)*rr;
      ctx.beginPath();ctx.arc(x,y,3,0,TAU);ctx.fillStyle=hexA(C('cyan'),Math.max(0,1-th.t));ctx.fill();
    }
  }
  st.threats=st.threats.filter(th=>th.st==='in'||th.t<1);
  // subtle counter
  label('THREATS MITIGATED  '+st.caught+'    ·    LOOP MATURITY '+Math.round(st.grow*100)+'%', cx, cy+R+64, 11, hexA(C('muted'),0.8),'center');
}

/* ---- Phase IV: the scale of governance ---- */
PH_ENTER.scale=()=>{st.angle=0;st.vel=0;st.target=0;st.motes=[];st.mspawn=0;st.decline=0;st.streams=[];
  for(let i=0;i<26;i++)st.streams.push({x:rnd(0,W),y:rnd(0,H),s:rnd(20,60)});};
function drawScale(dt){
  const cx=W/2,cy=H*0.42,beam=Math.min(W,H)*0.26;
  // calm data streams (bg)
  ctx.strokeStyle=hexA(C('cyan'),0.08);ctx.lineWidth=1;
  for(const s of st.streams){s.y+=s.s*dt;if(s.y>H)s.y=0;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y+14);ctx.stroke();}
  // physics: seek balance with damping; motes add torque
  st.vel += (-st.angle*3 + st.target)*dt; st.vel*=0.92; st.angle+=st.vel*dt;
  st.angle=Math.max(-0.32,Math.min(0.32,st.angle));st.target*=0.9;
  // spawn motes
  st.mspawn-=dt;if(st.mspawn<=0){st.mspawn=rnd(0.7,1.3);
    const side=Math.random()<0.5?-1:1, risky=Math.random()<0.32;
    st.motes.push({side,x:cx+side*beam,y:cy-140,risky,l:1,landed:false});}
  const lY=cy+Math.sin(st.angle)*beam, rY=cy-Math.sin(st.angle)*beam;
  for(const m of st.motes){
    if(!m.landed){m.y+=180*dt; const panY=(m.side<0?lY:rY)+120;
      if(m.y>=panY){m.landed=true;
        if(m.risky){st.decline=1;st.target += -m.side*1.4; m.l=0;} // courage to say no: reject, tip to safety(right)
        else {st.target += m.side*0.5;}
      }}
    else m.l-=dt*0.5;
    ctx.beginPath();ctx.arc(m.x,m.y,4,0,TAU);ctx.fillStyle=m.risky?hexA(C('war'),Math.max(0,m.l)):hexA(C('cyan'),Math.max(0,m.l));ctx.fill();
  }
  st.motes=st.motes.filter(m=>m.l>0&&m.y<H);
  // beam + pans
  ctx.save();ctx.translate(cx,cy);ctx.rotate(st.angle);
  ctx.strokeStyle=C('ink');ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-beam,0);ctx.lineTo(beam,0);ctx.stroke();
  for(const sgn of [-1,1]){ctx.strokeStyle=hexA(C('muted'),0.7);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sgn*beam,0);ctx.lineTo(sgn*beam-18,120);ctx.moveTo(sgn*beam,0);ctx.lineTo(sgn*beam+18,120);ctx.stroke();
    ctx.beginPath();ctx.arc(sgn*beam,120,22,0,Math.PI);ctx.strokeStyle=hexA(C('ink'),0.8);ctx.stroke();}
  ctx.restore();
  // fulcrum
  ctx.fillStyle=C('gold');ctx.beginPath();ctx.moveTo(cx,cy-6);ctx.lineTo(cx+16,cy+70);ctx.lineTo(cx-16,cy+70);ctx.closePath();ctx.fill();
  // decline flash
  if(st.decline>0){st.decline-=dt*1.5;label(TOK.decline,cx,cy-120,20,hexA(C('war'),st.decline),'center');}
  label(TOK.indiv,cx-beam,cy+170,12,hexA(C('muted'),0.9),'center');
  label(TOK.society,cx+beam,cy+170,12,hexA(C('muted'),0.9),'center');
}

/* ---- Phase V: the boundary (visionOS bridge) ---- */
PH_ENTER.bridge=()=>{st.frag=[];for(let i=0;i<40;i++)st.frag.push({a:rnd(0,TAU),r:rnd(180,420),tr:rnd(120,180)});};
function drawBridge(dt){
  const cx=W/2,cy=H*0.5,p=Math.min(1,pt/9);
  // HUD frame
  ctx.strokeStyle=hexA(C('cyan'),0.4);ctx.lineWidth=1.5;
  const m=40,cl=26;
  for(const [sx,sy,dx,dy] of [[m,m,1,1],[W-m,m,-1,1],[m,H-m,1,-1],[W-m,H-m,-1,-1]]){
    ctx.beginPath();ctx.moveTo(sx,sy+dy*cl);ctx.lineTo(sx,sy);ctx.lineTo(sx+dx*cl,sy);ctx.stroke();}
  // faint grid
  ctx.strokeStyle=hexA(C('cyan'),0.05);
  for(let x=0;x<W;x+=54){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  // LEFT: cracks that heal as p grows
  ctx.strokeStyle=hexA(C('war'),0.5*(1-p));ctx.lineWidth=2;
  for(let i=0;i<8;i++){const y=lerp(H*0.2,H*0.8,i/7);
    ctx.beginPath();ctx.moveTo(cx*0.12,y);
    let x=cx*0.12;for(let k=0;k<6;k++){x+=cx*0.7/6*(1-p);const yy=y+Math.sin(i*2+k)*14*(1-p);ctx.lineTo(x,yy);}ctx.stroke();}
  label(TOK.cracks,cx*0.5,H*0.14,12,hexA(C('war'),0.7*(1-p)+0.2),'center');
  // RIGHT: fragments assemble into a boundary shield arc
  const bx=cx*1.15;
  st.frag.forEach((f,i)=>{
    const settled=Math.max(0,(p-0.15))/0.85;
    const tr=lerp(f.tr, Math.min(H,W)*0.19, settled);
    const ang=lerp(f.a, -Math.PI/2 + (i/st.frag.length-0.5)*Math.PI*1.1, settled);
    const x=bx+Math.cos(ang)*lerp(f.r,tr,settled), y=cy+Math.sin(ang)*lerp(f.r,tr,settled);
    ctx.fillStyle=hexA(C('cyan'),0.5+0.5*settled);ctx.fillRect(x-1.5,y-1.5,3,3);
  });
  // solid boundary arc emerges
  ctx.strokeStyle=hexA(C('good'),0.3+0.6*p);ctx.lineWidth=3+p*2;
  ctx.beginPath();ctx.arc(bx,cy,Math.min(H,W)*0.19,-Math.PI*0.95,Math.PI*0.0);ctx.stroke();
  if(p>0.6)label(TOK.boundary,bx,cy+Math.min(H,W)*0.19+30,13,C('good'),'center');
}

/* dispatch */
const DRAW={connection:drawConnection,pillars:drawPillars,loop:drawLoop,scale:drawScale,bridge:drawBridge};

/* prologue torch + finale ambience (canvas) */
let embers=[];
let gt=0,heroAlpha=0;   // global clock (continuous breathing) + fade-in of the flame-bearer
/* prologue ignition: spark -> candle -> a large, steady flame (no figure yet) */
function drawIgnition(dt){
  const cx=W/2, cy=H*0.5, t=pt;
  const spark=Math.min(1,t/1.2);
  const candle=Math.max(0,Math.min(1,(t-1.2)/1.8));
  const grow=Math.max(0,Math.min(1,(t-3.0)/2.2));
  const flameScale=0.3+spark*0.5+candle*0.8+grow*0.7; // grows to ~2.3 — a big candle flame
  drawFlame(cx,cy,flameScale);
}
function drawFinale(dt){ // calm rising embers; the flame-bearer stands in its usual place (drawn globally)
  if(Math.random()<0.25)embers.push({x:rnd(0,W),y:H+4,vx:0,vy:rnd(-0.5,-0.2),l:1});
}

/* =====================================================================
   RENDER LOOP
===================================================================== */
let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  pt+=dt;gt+=dt;
  tickTransition(dt);
  // background wash
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,C('bg1'));bg.addColorStop(1,C('bg0'));
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  if(cur===0)drawIgnition(dt);
  else if(cur===6)drawFinale(dt);
  else{const key=PH[cur-1].key;(DRAW[key]||(()=>{}))(dt);
    // caption timing
    if(st.caps&&!st.capsDone){st.ct+=dt;if(st.ct>=5.0)nextCap();}
    updateProgress();
  }
  // the flame-bearer: fixed spot, fades in from Phase I, breathes ~20% for depth
  heroAlpha = cur>=1 ? Math.min(1,heroAlpha+dt/1.2) : 0;
  if(cur>=1&&cur<=6){
    hero.visible=true;hero.alpha=heroAlpha;hero.facing=-1;hero.flameScale=0.8;
    hero.x=W*0.82;hero.y=H*0.72;hero.size=1+0.1*Math.sin(gt*0.7);
    drawHero(hero);
  }
  // global ember pass — the carried flame sheds sparks; drained & bounded every frame
  for(const e of embers){e.x+=e.vx;e.y+=e.vy;e.l-=dt*0.5;
    ctx.fillStyle=hexA(C('ember'),Math.max(0,e.l));ctx.fillRect(e.x,e.y,2,2);}
  embers=embers.filter(e=>e.l>0&&e.y>-10);
  drawWipe();
}

/* =====================================================================
   ORCHESTRATION + UI
===================================================================== */
let auto=false;
const REDUCE=matchMedia('(prefers-reduced-motion:reduce)').matches;
const trans={active:false,t:0,dur:1.1,phase:'walk',to:1};
function startTransition(to){
  if(REDUCE){enterPhase(to);return;}          // reduced-motion: hard cut
  trans.active=true;trans.t=0;trans.to=to;trans._entered=false;
}
function tickTransition(dt){
  if(!trans.active)return;
  trans.t+=dt;
  if(trans.t>=0.30&&!trans._entered){trans._entered=true;enterPhase(trans.to);}  // swap phase under the flash
  if(trans.t>=0.60){trans.active=false;trans._entered=false;}
}
function drawWipe(){
  if(!trans.active)return;
  const a=1-Math.abs(trans.t/0.30-1);          // 0->1->0 across a ~0.6s ember light-wipe
  ctx.fillStyle=hexA(C('ember'),Math.max(0,Math.min(1,a)));ctx.fillRect(0,0,W,H);
}
function goTo(n){if(n<0||n>6)return;clearTimeout(st.adv);clearTimeout(st.tcTimer);
  const forwardContent=(n>=1&&n<=5)&&(n>cur)&&(cur>=0&&cur<=5)&&!REDUCE;
  if(forwardContent){startTransition(n);} else {trans.active=false;enterPhase(n);}}
function renderDots(){const el=document.getElementById('dots');el.innerHTML='';
  for(let i=1;i<=5;i++){const b=document.createElement('button');
    b.className='dot'+(i===cur?' active':'')+(i<cur||done.has(i)?' done':'');b.title='Phase '+i;
    b.onclick=()=>goTo(i);el.appendChild(b);}}
function updateProgress(){const el=document.getElementById('prog');
  let f=0; if(cur===0)f=0; else if(cur===6)f=1; else{const capN=(st.caps?st.caps.length:1);
    const inner=st.capsDone?1:((st.ci+(st.ct/5))/capN); f=((cur-1)+Math.max(0,Math.min(1,inner)))/5;}
  el.style.width=(f*100)+'%';}

function lightPrologue(){renderPrologueText();const pr=document.getElementById('prologue');
  pr.classList.remove('lit');requestAnimationFrame(()=>pr.classList.add('lit'));embers=[];}
function renderPrologueText(){
  document.getElementById('proTitle').textContent=T(STR.title);
  document.getElementById('proTag').textContent=T(STR.tag);
  document.getElementById('proCta').textContent=T(STR.begin);
}
function renderFinaleText(){
  document.getElementById('fnK').textContent=T(STR.fnK);
  document.getElementById('fnLine').textContent=T(STR.fnLine);
  document.getElementById('fnSign').textContent=T(STR.fnSign);
  document.getElementById('fnReplay').textContent=T(STR.replay);
}
function renderChrome(){
  document.getElementById('brand').childNodes[0].nodeValue=T(STR.title);
  document.getElementById('brandSub').textContent=T(STR.sub);
  document.getElementById('langBtn').textContent=LANG_LABEL[LANG()];
  document.getElementById('autoLbl').textContent=T(STR.auto);
  if(cur>=1&&cur<=5){const p=PH[cur-1];
    document.getElementById('tcLabel').textContent=T(p.label);
    document.getElementById('tcHead').textContent=T(p.head);
    document.getElementById('nowL').textContent=T(p.label);
    document.getElementById('nowH').textContent=T(p.head);
    if(st.caps&&st.ci>=0&&st.ci<st.caps.length)document.getElementById('capT').textContent=T(st.caps[st.ci]);}
}
function relangAll(){renderChrome();renderPrologueText();renderFinaleText();}

/* audio: none bundled (kept silent & dependency-free). Hook left for future. */
function setBgm(){}

/* controls */
document.getElementById('proCta').onclick=()=>goTo(1);
document.getElementById('fnReplay').onclick=()=>{auto=false;document.getElementById('autoBtn').classList.remove('on');done.clear();
  trans.active=false;embers=[];hero.visible=false;hero.flameScale=1;hero.x=0;goTo(0);};
document.getElementById('prev').onclick=()=>goTo(Math.max(0,cur-1));
document.getElementById('next').onclick=()=>goTo(Math.min(6,cur+1));
document.getElementById('themeBtn').onclick=()=>{theme=(theme==='dark')?'light':'dark';applyTheme();refreshColors();};
document.getElementById('langBtn').onclick=()=>{li=(li+1)%LANGS.length;
  document.documentElement.lang=LANG();relangAll();};
document.getElementById('autoBtn').onclick=()=>{auto=!auto;
  document.getElementById('autoBtn').classList.toggle('on',auto);
  if(auto){ if(cur===0)goTo(1); else if(cur>=1&&cur<=5&&st.capsDone)st.adv=setTimeout(()=>goTo(cur+1),500); }
  else clearTimeout(st.adv);};
addEventListener('keydown',e=>{if(e.key==='ArrowRight')goTo(Math.min(6,cur+1));
  else if(e.key==='ArrowLeft')goTo(Math.max(0,cur-1));});

/* boot */
applyTheme();refreshColors();relangAll();
enterPhase(0);
requestAnimationFrame(frame);
</script>
</body>
</html>
